name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install UV
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync

    - name: Run workflow tests
      run: |
        uv run python test_workflow.py

    - name: Run unit tests (when available)
      run: |
        uv run pytest tests/ -v || echo "Pytest not yet configured"
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install UV
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        uv sync

    - name: Run ruff
      run: |
        uv run ruff check . || echo "Ruff check failed (non-blocking)"
      continue-on-error: true

    - name: Run black check
      run: |
        uv run black --check . || echo "Black check failed (non-blocking)"
      continue-on-error: true

  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build agent container
      run: |
        cd executors
        docker build --platform linux/amd64 -t kali-smart-operator:test .

    - name: Test container basic functionality
      run: |
        docker run --rm kali-smart-operator:test nmap --version
        docker run --rm kali-smart-operator:test ffuf -V
